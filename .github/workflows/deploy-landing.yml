name: Deploy landing to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - "landing/**"
      - ".github/workflows/deploy-landing.yml"
  workflow_dispatch:

# Allow GITHUB_TOKEN to deploy to Pages, and OIDC for deploy-pages.
permissions:
  contents: read
  pages: write
  id-token: write

# One deploy at a time; don't cancel an in-progress production deploy.
concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    # Only the canonical repo builds & deploys — forks never publish.
    if: github.repository == 'Leo12261975/Homo-Sui-Iuris'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: landing
    steps:
      - uses: actions/checkout@v5

      - uses: pnpm/action-setup@v6
        with:
          version: 10

      - uses: actions/setup-node@v5
        with:
          node-version: 24
          cache: pnpm
          cache-dependency-path: landing/pnpm-lock.yaml

      - run: pnpm install --frozen-lockfile

      # Derive the canonical origin + repo subpath from the running repo, so
      # this works unchanged whether it runs in Leo12261975/Homo-Sui-Iuris or a
      # fork. github.io hosts are lowercase; the repo name (the base) is not.
      - name: Compute Pages URLs
        run: |
          echo "SITE=https://${GITHUB_REPOSITORY_OWNER,,}.github.io" >> "$GITHUB_ENV"
          echo "BASE_PATH=/${GITHUB_REPOSITORY#*/}" >> "$GITHUB_ENV"

      - run: pnpm build

      - uses: actions/upload-pages-artifact@v5
        with:
          path: landing/dist

  deploy:
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - id: deployment
        uses: actions/deploy-pages@v5
